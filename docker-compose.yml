services:
  postgres:
    image: postgres:17-alpine
    container_name: kc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: admin
    volumes:
      - kc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --http-enabled=true
      - --hostname=http://167.86.79.16:8080
      - --hostname-strict=false
      - --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: admin

      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: "http://167.86.79.16:8080"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./realms/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  segma-backend:
    image: segma-backend:latest
    container_name: segma-backend
    restart: always
    ports:
      - "8901:8900"
    environment:
      PORT: "8900"
      KEYCLOAK_ISSUER: "http://keycloak:8080/realms/cnas-sso"
      KEYCLOAK_JWKS_URL: "http://keycloak:8080/realms/cnas-sso/protocol/openid-connect/certs"
    depends_on:
      keycloak:
        condition: service_healthy

  echifa-backend:
    image: echifa-backend:latest
    container_name: echifa-backend
    restart: always
    ports:
      - "8902:8900"
    environment:
      PORT: "8900"
      KEYCLOAK_ISSUER: "http://keycloak:8080/realms/cnas-sso"
      KEYCLOAK_JWKS_URL: "http://keycloak:8080/realms/cnas-sso/protocol/openid-connect/certs"
    depends_on:
      keycloak:
        condition: service_healthy

  echifa-frontend:
    image: echifa-frontend:latest
    container_name: echifa-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      AUTH_URL: "http://167.86.79.16:3000"
      NEXTAUTH_URL: "http://167.86.79.16:3000"
      AUTH_SECRET: "change-this-secret"

      AUTH_KEYCLOAK_ID: "echifa-web"
      AUTH_KEYCLOAK_SECRET: "echifa-web-secret"
      AUTH_KEYCLOAK_ISSUER: "http://167.86.79.16:8080/realms/cnas-sso"

      API_URL: "http://echifa-backend:8900"
      NEXT_PUBLIC_API_URL: "http://167.86.79.16:8902"
    depends_on:
      keycloak:
        condition: service_healthy
      echifa-backend:
        condition: service_started

  segma-frontend:
    image: segma-frontend:latest
    container_name: segma-frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      AUTH_URL: "http://167.86.79.16:3001"
      NEXTAUTH_URL: "http://167.86.79.16:3001"
      AUTH_SECRET: "change-this-secret"

      AUTH_KEYCLOAK_ID: "segma-web"
      AUTH_KEYCLOAK_SECRET: "segma-web-secret"
      AUTH_KEYCLOAK_ISSUER: "http://167.86.79.16:8080/realms/cnas-sso"

      API_URL: "http://segma-backend:8900"
      NEXT_PUBLIC_API_URL: "http://167.86.79.16:8901"
    depends_on:
      keycloak:
        condition: service_healthy
      segma-backend:
        condition: service_started

volumes:
  kc_postgres_data:
