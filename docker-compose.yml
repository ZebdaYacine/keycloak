services:
  segma-backend:
    image: segma-backend:latest
    container_name: segma-backend
    restart: always
    ports:
      - "8901:8900"
    environment:
      PORT: "8900"
      KEYCLOAK_ISSUER: "http://167.86.79.16:8080/realms/cnas-sso"
      KEYCLOAK_JWKS_URL: "http://167.86.79.16:8080/realms/cnas-sso/protocol/openid-connect/certs"

  segma-frontend:
    image: segma-frontend:latest
    container_name: segma-frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      AUTH_URL: "http://167.86.79.16:3001"
      NEXTAUTH_URL: "http://167.86.79.16:3001"
      AUTH_SECRET: "change-this-secret"
      AUTH_KEYCLOAK_ID: "segma-web"
      AUTH_KEYCLOAK_SECRET: "segma-web-secret"
      AUTH_KEYCLOAK_ISSUER: "http://167.86.79.16:8080/realms/cnas-sso"

  echifa-backend:
    image: echifa-backend:latest
    container_name: echifa-backend
    restart: always
    ports:
      - "8902:8900"
    environment:
      PORT: "8900"
      KEYCLOAK_ISSUER: "http://167.86.79.16:8080/realms/cnas-sso"
      KEYCLOAK_JWKS_URL: "http://167.86.79.16:8080/realms/cnas-sso/protocol/openid-connect/certs"

  echifa-frontend:
    image: echifa-frontend:latest
    container_name: echifa-frontend
    restart: always
    ports:
      - "3002:3000"
    environment:
      AUTH_URL: "http://167.86.79.16:3002"
      NEXTAUTH_URL: "http://167.86.79.16:3002"
      AUTH_SECRET: "change-this-secret"
      AUTH_KEYCLOAK_ID: "echifa-web"
      AUTH_KEYCLOAK_SECRET: "echifa-web-secret"
      AUTH_KEYCLOAK_ISSUER: "http://167.86.79.16:8080/realms/cnas-sso"

  postgres:
    image: postgres:17-alpine
    container_name: kc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: change_this_db_password
    volumes:
      - kc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: change_this_db_password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: change_this_admin_password
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./realms/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  kc_postgres_data:
